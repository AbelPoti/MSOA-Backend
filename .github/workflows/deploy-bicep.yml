name: Bicep CI/CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  id-token: write   # required for OIDC login to Azure
  contents: read

env:
  BICEP_FILE_PATH: infra/main.bicep

jobs:
  build_bicep:
    name: Build Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bicep
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Starting bicep file build..."
            az bicep build --file "${BICEP_FILE_PATH}"
            echo "Bicep file built successfully."          

  whatif_bicep:
    name: What-If Preview
    runs-on: ubuntu-latest
    needs: build_bicep
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run What-If
        run: |
          echo "Running what-if..."
          az deployment group what-if \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "whatif-${{ github.run_id }}" \
            --template-file "${BICEP_FILE_PATH}" \
            --parameters \
              uamiName=msoauami \
              storageAccountName=msoastga \
              keyVaultName=msoakv \
              aksName=msoaaks \
              acrName=msoaacr \
            --result-format FullResourcePayloads

          echo "Successfully created preview for resources to deploy."

  deploy_bicep:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    needs: whatif_bicep
    if: github.ref == 'refs/heads/main'

    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          echo "Starting bicep deployment..."

          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "deploy-${{ github.run_id }}" \
            --template-file "${BICEP_FILE_PATH}" \
            --parameters \
              uamiName=msoauami \
              storageAccountName=msoastga \
              keyVaultName=msoakv \
              aksName=msoaaks \
              acrName=msoaacr

          echo "Deployment complete."