spring.application.name=Core
spring.datasource.url=jdbc:mysql://core-db:3306/replate_core
spring.datasource.username=${REPLATE_DATASOURCE_USER}
spring.datasource.password=${REPLATE_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000

server.port=8080

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/insert_categories.sql, classpath:sql/insert_countries.sql, \
  classpath:sql/insert_counties.sql, classpath:sql/insert_cities.sql