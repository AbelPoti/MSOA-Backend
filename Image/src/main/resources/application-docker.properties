spring.application.name=Image
spring.datasource.url=jdbc:mysql://image-db:3306/replate_image
spring.datasource.username=${REPLATE_DATASOURCE_USER}
spring.datasource.password=${REPLATE_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.images.upload-dir=./Image/uploads/images

core.service.uri=http://core:8080

spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000

server.port=8082