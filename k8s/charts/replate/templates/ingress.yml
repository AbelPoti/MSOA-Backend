apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: api.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8081

          - path: /images
            pathType: Prefix
            backend:
              service:
                name: image
                port:
                  number: 8082

          - path: /
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: 8080