plugins {
    id 'java'
}

apply from: './lint.gradle'

group = 'edu.bbte'
version = '0.0.1-SNAPSHOT'
description = 'RePlate'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
}

tasks.named('test') {
    useJUnitPlatform()
}

